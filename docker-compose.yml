  #   environment:
  #     TZ: ${TZ:-Asia/Shanghai}
  #     SERVICE_NAME: metastore
  #     HIVE_DATABASE: ${HIVE_DATABASE:-heart_disease}
  #   ports:
  #     - "9083:9083"
  #
  # namenode:
  #   profiles: ["hive"]
  #   image: bde2020/hadoop-namenode:2.0.0-hadoop3.3.6-java8
